name: Create Release on Version Change

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'woo-customer-group-discount.php'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(grep -oP "Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+" woo-customer-group-discount.php | head -1)
          echo "Current version: $CURRENT_VERSION"

          git show HEAD~1:woo-customer-group-discount.php > /tmp/previous.php 2>/dev/null || echo "Version: 0.0.0" > /tmp/previous.php
          PREVIOUS_VERSION=$(grep -oP "Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+" /tmp/previous.php | head -1 || echo "0.0.0")
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  create-release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create plugin zip
        run: |
          mkdir -p build/woo-customer-group-discount

          # Copy plugin files (dev files like tests/ are intentionally excluded)
          cp -r includes build/woo-customer-group-discount/
          cp woo-customer-group-discount.php build/woo-customer-group-discount/
          cp readme.txt build/woo-customer-group-discount/ 2>/dev/null || true

          cd build
          zip -r ../woo-customer-group-discount-${{ needs.check-version.outputs.new_version }}.zip woo-customer-group-discount
          cp ../woo-customer-group-discount-${{ needs.check-version.outputs.new_version }}.zip ../woo-customer-group-discount-latest.zip
          cd ..

      - name: Generate changelog
        id: changelog
        run: |
          if [ -f "readme.txt" ]; then
            CHANGELOG=$(sed -n "/== Changelog ==/,/== /p" readme.txt | head -50 | tail -n +2 | head -n -1)
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG=$(git log --oneline -10 --pretty=format:"- %s")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: Woo Customer Group Discount v${{ needs.check-version.outputs.new_version }}
          body: |
            ## Woo Customer Group Discount v${{ needs.check-version.outputs.new_version }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Installation
            1. Download `woo-customer-group-discount-${{ needs.check-version.outputs.new_version }}.zip`
            2. Go to WordPress Admin → Plugins → Add New → Upload Plugin
            3. Upload the zip file and activate

            ### Requirements
            - WordPress 5.8+
            - WooCommerce 6.0+
            - PHP 7.4+
          files: |
            woo-customer-group-discount-${{ needs.check-version.outputs.new_version }}.zip
            woo-customer-group-discount-latest.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
